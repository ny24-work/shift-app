<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#2563eb"><link rel="manifest" href="manifest.webmanifest"><title>勤務予定表 自動作成 Ver.1.0</title><link rel="stylesheet" href="style.css"></head><body><header><h1>勤務予定表 自動作成 Ver.1.0</h1><p>店長＝管理 / やす＝開発 / スタッフ＝希望休・閲覧</p></header><main><section id="login" class="card"><h2>ログイン</h2><div class="grid"><div><label>役割</label><select id="role"><option value="manager">店長・管理者</option><option value="developer">やす・開発者</option><option value="staff">スタッフ</option></select></div><div><label>名前</label><select id="loginName"></select></div><div><label>パスコード</label><input id="pass" type="password" placeholder="店長0000 / やす9999"></div></div><button onclick="login()">入る</button><button class="ghost" onclick="demoLogin()">試しに店長で入る</button><p class="muted">まずは端末内保存で動く版。GitHub PagesでURL共有できます。</p></section><section id="app" class="hidden"><nav class="tabs"><button class="tab active" onclick="showTab('home')">ホーム</button><button class="tab" onclick="showTab('request')">希望休</button><button class="tab admin" onclick="showTab('meals')">食数</button><button class="tab admin" onclick="showTab('staff')">スタッフ</button><button class="tab admin" onclick="showTab('rules')">ルール</button><button class="tab admin" onclick="showTab('schedule')">勤務表</button><button class="tab admin" onclick="showTab('share')">共有/保存</button></nav><div id="home" class="card page"><h2>ホーム</h2><p><span id="who" class="pill"></span></p><div class="row"><button class="admin" onclick="generateSchedule()">シフト自動作成</button><button class="ghost" onclick="exportCSV()">CSV出力</button></div><div id="homeCards" class="grid"></div><div id="warnings" class="status"></div></div><div id="request" class="card page hidden"><h2>希望休</h2><div id="requestArea"></div><button onclick="saveRequests()">希望休を保存</button></div><div id="meals" class="card page hidden"><h2>食数</h2><div class="tableWrap"><table id="mealTable"></table></div><button onclick="saveMeals()">食数を保存</button></div><div id="staff" class="card page hidden"><h2>スタッフ設定</h2><div id="staffArea"></div><button onclick="saveStaffs()">保存</button><button class="ghost" onclick="addStaff()">追加</button></div><div id="rules" class="card page hidden"><h2>勤務ルール</h2><div id="shiftArea"></div><h3>必要人数</h3><div class="grid"><div><label>基本人数</label><input id="baseNeed" type="number"></div><div><label>60食以上</label><input id="need60" type="number"></div><div><label>80食以上</label><input id="need80" type="number"></div><div><label>100食以上</label><input id="need100" type="number"></div><div><label>120食以上</label><input id="need120" type="number"></div><div><label>最大連勤</label><input id="maxConsecutive" type="number"></div></div><button onclick="saveRules()">保存</button></div><div id="schedule" class="card page printArea hidden"><h2>2026年7月 勤務予定表</h2><div class="row noPrint"><button onclick="generateSchedule()">シフト自動作成</button><button class="secondary" onclick="window.print()">印刷/PDF保存</button></div><div class="tableWrap"><table id="scheduleTable"></table></div></div><div id="share" class="card page hidden"><h2>共有/保存</h2><p class="muted">GitHub Pagesに公開したURLを店長へ送れば開けます。今の版は各端末保存なので、同じデータを共有する時はバックアップJSONを受け渡すか、次にFirebase版へします。</p><button onclick="exportBackup()">バックアップJSON出力</button><button class="ghost" onclick="document.getElementById('importFile').click()">バックアップ読込</button><input id="importFile" class="hidden" type="file" accept=".json" onchange="importBackup(event)"><button class="danger" onclick="resetAll()">全初期化</button></div></section></main><script src="app.js"></script></body></html>
